<!DOCTYPE html>
<html>
<head>
    <title>Employee registration Form</title>
</head>

<body style="font-family: Verdana; background-color:#f1f8e9;">

<div style="width:45%; margin:auto; background:#ffffff; padding:25px; margin-top:40px; border-radius:10px; border:2px solid #8bc34a;">

    <h2 style="text-align:center; color:#33691e;">Employee Registration Form</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text" placeholder="Enter Full Name" style="width:100%; padding:6px;"><br><br>

        <label>Email Address:</label><br>
        <input type="email" placeholder="Enter Email" style="width:100%; padding:6px;"><br><br>

        <label>Contact Number:</label><br>
        <input type="tel" placeholder="Enter Mobile Number" style="width:100%; padding:6px;"><br><br>

        <label>Password:</label><br>
        <input type="password" placeholder="Create Password" style="width:100%; padding:6px;"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Prefer not to say<br><br>

        <label>Select Department:</label><br>
        <select style="width:100%; padding:6px;">
            <option>Select Department</option>
            <option>Software</option>
            <option>Accounts</option>
            <option>Sales</option>
            <option>Support</option>
        </select><br><br>

        <label>Experience Level:</label><br>
        <input type="radio" name="exp"> Fresher
        <input type="radio" name="exp"> 1-3 Years
        <input type="radio" name="exp"> 3+ Years<br><br>

        <label>Upload Resume:</label><br>
        <input type="file"><br><br>

        <label>Address:</label><br>
        <textarea rows="4" style="width:100%;"></textarea><br><br>

        <label>Joining Date:</label><br>
        <input type="date" style="width:100%; padding:6px;"><br><br>

        <center>
            <input type="submit" value="Submit" style="background:#33691e; color:white; padding:10px 20px; border:none; border-radius:5px;">
            <input type="reset" value="Reset" style="padding:10px 20px; border-radius:5px;">
        </center>

    </form>

</div>

</body>
</html>
