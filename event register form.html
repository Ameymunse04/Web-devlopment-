<!DOCTYPE html>
<html>
<head>
<title>College Event Registration Form</title>

<style>
body{
    font-family: Arial;
    background-color:#e6a2a7;
}

.container{
    width:420px;
    margin:auto;
    padding:20px;
    background:white;
    border:3px solid black;
    border-radius:10px;
}

h2{
    text-align:center;
}

input[type=text],
input[type=email],
input[type=tel],
select,
textarea{
    width:100%;
    padding:6px;
    margin:6px 0;
    border:1px solid black;
}

button{
    padding:8px 15px;
    margin-top:10px;
    border:1px solid black;
}
</style>

</head>

<body>

<div class="container">

<h2>College Event Registration Form</h2>

<form>

<label>Full Name:</label>
<input type="text">

<label>Email:</label>
<input type="email">

<label>Phone Number:</label>
<input type="tel">

<label>Gender:</label><br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

<label>College Name:</label>
<input type="text">

<label>Year:</label>
<select>
<option>First Year</option>
<option>Second Year</option>
<option>Third Year</option>
<option>Final Year</option>
</select>

<label>Select Event:</label><br>
<input type="radio" name="event"> Competition <br>
<input type="radio" name="event"> Workshop <br>
<input type="radio" name="event"> Seminar <br>
<input type="radio" name="event"> Hackathon <br><br>

<label>Comments:</label>
<textarea rows="4"></textarea>

<br>

<button type="submit">Register</button>
<button type="reset">Clear</button>

</form>

</div>

</body>
</html>
